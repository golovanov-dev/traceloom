name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - run: composer install --prefer-dist --no-interaction --no-progress
      - run: composer validate --strict
      - run: composer test
      - run: composer analyse
